name: E2E Tests

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  e2e:
    name: Local k3s e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Set up kubectl
        run: |
          K3S_VERSION="$(sudo podman run --rm docker.io/rancher/k3s:latest --version | awk 'NR == 1 { print $3 }')"
          K8S_MINOR="${K3S_VERSION%%+*}"
          K8S_MINOR="${K8S_MINOR%.*}"
          KUBECTL_VERSION="$(curl -fsSL "https://dl.k8s.io/release/stable-${K8S_MINOR#v}.txt")"
          echo "Using k3s ${K3S_VERSION} with kubectl ${KUBECTL_VERSION}"
          curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          sudo install -m 0755 kubectl /usr/local/bin/kubectl
          kubectl version --client=true

      - name: Create k3s cluster
        run: |
          sudo podman run --detach --name openclaw-k3s --privileged \
            --publish 127.0.0.1:6443:6443 \
            docker.io/rancher/k3s:latest server \
            --disable traefik \
            --tls-san 127.0.0.1 \
            --write-kubeconfig-mode 644
          mkdir -p "${RUNNER_TEMP}/kube"
          for _ in {1..60}; do
            if sudo podman exec openclaw-k3s cat /etc/rancher/k3s/k3s.yaml > "${RUNNER_TEMP}/kube/config"; then
              sed -i 's/127.0.0.1/127.0.0.1/g' "${RUNNER_TEMP}/kube/config"
              KUBECONFIG="${RUNNER_TEMP}/kube/config" kubectl get nodes && exit 0
            fi
            sleep 2
          done
          sudo podman logs openclaw-k3s
          exit 1

      - name: Run e2e suite
        env:
          KUBECONFIG: ${{ runner.temp }}/kube/config
          E2E_IMAGE_LOADER: k3s-container
          E2E_K3S_CONTAINER: openclaw-k3s
        run: go test ./test/e2e -count=1 -timeout=15m
