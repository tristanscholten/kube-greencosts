name: E2E Tests

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  e2e:
    name: Local kind e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Create kind cluster
        uses: helm/kind-action@v1.12.0
        with:
          cluster_name: kind

      - name: Run e2e suite
        env:
          E2E_IMAGE_LOADER: kind
        run: go test ./test/e2e -count=1 -timeout=15m
