name: Container Image

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  IMAGE_NAME: docker.io/tristanscholten/kube-greencosts-controller

jobs:
  build:
    name: Build and publish container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read SemVer
        id: release-version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must contain SemVer without a leading v, got: $version" >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "v${version}" ]]; then
            echo "Git tag ${GITHUB_REF_NAME} does not match VERSION v${version}" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Prepare SemVer branch context
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        id: semver-context
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git checkout -B "${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}"

          pr_number=""
          source_ref=""
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            pr_number="${{ github.event.pull_request.number }}"
            source_ref="${GITHUB_HEAD_REF}"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            pr_number="$(
              gh api \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
                --jq '.[0].number // empty' || true
            )"
            source_ref="$(
              gh api \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" \
                --jq '.[0].head.ref // empty' || true
            )"
          fi

          source_ref="${source_ref:-fix/${GITHUB_REF_NAME}}"
          pr_number="${pr_number:-0}"

          semver_sha="$(
            GIT_AUTHOR_NAME="github-actions[bot]" \
            GIT_AUTHOR_EMAIL="41898282+github-actions[bot]@users.noreply.github.com" \
            GIT_COMMITTER_NAME="github-actions[bot]" \
            GIT_COMMITTER_EMAIL="41898282+github-actions[bot]@users.noreply.github.com" \
            git commit-tree HEAD^{tree} \
              -p HEAD \
              -m "Merge pull request #${pr_number} from ${GITHUB_REPOSITORY_OWNER}/${source_ref}"
          )"
          git replace "${GITHUB_SHA}" "$semver_sha"

      - name: Calculate SemVer image tag
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
        id: semver
        uses: gandarez/semver-action@v2.2.0
        with:
          branching_model: trunk-based
          base_version: ${{ steps.release-version.outputs.version }}
          main_branch_name: main
          minor_regex: "(?i)^(.+:)?(feat(ure)?/.+)"
          patch_regex: "(?i)^(.+:)?((bugfix|fix|hotfix)/.+)"
          major_regex: "(?i)^(.+:)?(release/.+)"

      - name: Select image tag
        id: image-version
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release-version.outputs.version }}
          SEMVER_TAG: ${{ steps.semver.outputs.SEMVER_TAG || steps.semver.outputs.semver_tag }}
        run: |
          if [[ -z "${SEMVER_TAG}" ]]; then
            image_tag="v${RELEASE_VERSION}"
          else
            image_tag="${SEMVER_TAG//+/-}"
          fi

          if [[ ! "$image_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Calculated image tag is not Docker-safe SemVer: $image_tag" >&2
            exit 1
          fi

          echo "tag=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Container metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.image-version.outputs.tag }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr

      - name: Build and optionally push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
