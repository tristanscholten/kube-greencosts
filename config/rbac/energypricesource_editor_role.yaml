# This rule is not used by the project kube-greencosts itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the greencosts.hstr.nl.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kube-greencosts
    app.kubernetes.io/managed-by: kustomize
  name: energypricesource-editor-role
rules:
- apiGroups:
  - greencosts.hstr.nl
  resources:
  - energypricesources
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - greencosts.hstr.nl
  resources:
  - energypricesources/status
  verbs:
  - get
