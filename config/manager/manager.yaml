apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kube-greencosts
    app.kubernetes.io/managed-by: kustomize
  name: system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kube-greencosts
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: kube-greencosts
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: kube-greencosts
    spec:
      securityContext:
        # Projects are configured by default to adhere to the "restricted" Pod Security Standards.
        # This ensures that deployments meet the highest security requirements for Kubernetes.
        # For more details, see: https://kubernetes.io/docs/concepts/security/pod-security-standards/#restricted
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: docker.io/tristanscholten/kube-greencosts-controller:latest
        imagePullPolicy: IfNotPresent
        name: manager
        ports: []
        env:
          # ── OpenTelemetry tracing ────────────────────────────────────────────
          # Tracing is opt-in. Set OTEL_EXPORTER_OTLP_ENDPOINT to point at your
          # collector. When unset, the operator uses a no-op tracer provider.
          # To keep the exporter configured but disable span recording:
          # OTEL_TRACES_SAMPLER=always_off
          #
          # - name: OTEL_EXPORTER_OTLP_ENDPOINT
          #   value: "http://otel-collector.monitoring:4317"
          #
          # Optional: add cluster label to all spans
          # - name: OTEL_RESOURCE_ATTRIBUTES
          #   value: "k8s.cluster.name=production"
          #
          # Optional: reduce to 10 % sampling
          # - name: OTEL_TRACES_SAMPLER
          #   value: "parentbased_traceidratio"
          # - name: OTEL_TRACES_SAMPLER_ARG
          #   value: "0.1"
          #
          # Optional: bearer token for hosted backends (e.g. Grafana Cloud)
          # - name: OTEL_EXPORTER_OTLP_HEADERS
          #   value: "Authorization=Bearer <token>"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts: []
      volumes: []
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
