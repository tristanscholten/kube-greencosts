apiVersion: greencosts.hstr.nl/v1alpha1
kind: HibernatePolicy
metadata:
  name: hibernatepolicy-sample
  namespace: my-app
  labels:
    app.kubernetes.io/name: kube-greencosts
    app.kubernetes.io/managed-by: kustomize
spec:
  # workloadTypes lists which Kubernetes workload kinds this policy hibernates.
  # Only workloads of these types in the same namespace are affected.
  workloadTypes:
    - Deployment
    - StatefulSet

  # availabilityWindows defines recurring time slots during which hibernation
  # is suppressed. Any hibernated workloads are restored at the start of each window.
  availabilityWindows:
    - weekdays: [Mon, Tue, Wed, Thu, Fri]
      from: "08:00"
      until: "18:00"
      timezone: "Europe/Amsterdam"

  # action describes what happens when a workload is hibernated.
  #
  # sleepDaemonSet hibernates DaemonSets only (nodeSelector injection).
  # maxReplicas caps Deployments, StatefulSets and ReplicaSets; set to 0 to
  # scale them completely to zero. Both fields can be used at the same time.
  action:
    sleepDaemonSet: true   # hibernates DaemonSets listed in workloadTypes
    maxReplicas: 0         # scales Deployments/StatefulSets/ReplicaSets to zero
    # maxReplicas: 2       # alternative: cap at 2 replicas instead of zero
