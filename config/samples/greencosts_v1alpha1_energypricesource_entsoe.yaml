apiVersion: greencosts.hstr.nl/v1alpha1
kind: EnergyPriceSource
metadata:
  labels:
    app.kubernetes.io/name: kube-greencosts
    app.kubernetes.io/managed-by: kustomize
  name: energypricesource-entsoe
spec:
  provider: entsoe
  biddingZone: NL
  # refreshSchedule defaults to "0 0,6,12,18 * * *" (every 6 hours). Override if needed.
  # Keep cached prices valid for 350 minutes so there is a small overlap
  # before the next scheduled fetch.
  cacheTTL: 350m
  providers:
    entsoeConfig:
      secretRef:
        name: entsoe-token   # kubectl create secret generic entsoe-token --from-literal=token=<YOUR_TOKEN>
        key: token
      # Optional: omit areaCode to use the built-in EIC code for biddingZone.
      # Set explicitly when using a zone not in the built-in table.
      # areaCode: "10YNL----------L"
---
apiVersion: v1
kind: Secret
metadata:
  name: entsoe-token
type: Opaque
stringData:
  token: "<token here>"
