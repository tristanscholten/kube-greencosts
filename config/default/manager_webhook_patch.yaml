# This patch injects the webhook TLS certificate into the manager pod by:
# 1. Adding the --webhook-cert-path flag pointing to the mounted Secret directory.
# 2. Mounting the cert-manager-issued Secret into that directory.
# 3. Exposing port 9443 for the webhook server.
- op: add
  path: /spec/template/spec/containers/0/args/-
  value: --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
- op: add
  path: /spec/template/spec/containers/0/ports/-
  value:
    containerPort: 9443
    name: webhook-server
    protocol: TCP
- op: add
  path: /spec/template/spec/containers/0/volumeMounts/-
  value:
    mountPath: /tmp/k8s-webhook-server/serving-certs
    name: cert
    readOnly: true
- op: add
  path: /spec/template/spec/volumes/-
  value:
    name: cert
    secret:
      defaultMode: 420
      secretName: webhook-server-cert
