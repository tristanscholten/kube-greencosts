                  - until
                  - weekdays
                  type: object
                type: array
              excludedResources:
                description: |-
                  ExcludedResources prevents the policy from affecting the listed workload kinds.
                  When set, all other workload kinds are still governed by this policy.
                  Mutually exclusive with IncludedResources.
                items:
                  description: WorkloadType identifies a supported Kubernetes workload
                    kind.
                  enum:
                  - Deployment
                  - StatefulSet
                  - DaemonSet
                  - ReplicaSet
                  type: string
                type: array
              includedResources:
                description: |-
                  IncludedResources restricts the policy to only the listed workload kinds.
                  When set, workload kinds not listed are never affected by this policy.
                  Mutually exclusive with ExcludedResources.
                items:
                  description: WorkloadType identifies a supported Kubernetes workload
                    kind.
                  enum:
                  - Deployment
                  - StatefulSet
                  - DaemonSet
                  - ReplicaSet
                  type: string
                type: array
            required:
            - action
            type: object
            x-kubernetes-validations:
            - message: includedResources and excludedResources are mutually exclusive
              rule: '!(has(self.includedResources) && has(self.excludedResources))'
          status:
            description: ClusterHibernatePolicyStatus defines the observed state of
