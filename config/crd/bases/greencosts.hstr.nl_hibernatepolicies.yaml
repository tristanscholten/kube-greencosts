---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: hibernatepolicies.greencosts.hstr.nl
spec:
  group: greencosts.hstr.nl
  names:
    kind: HibernatePolicy
    listKind: HibernatePolicyList
    plural: hibernatepolicies
    shortNames:
    - hp
    singular: hibernatepolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.hibernatedWorkloads
      name: Hibernated
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          HibernatePolicy is the Schema for the hibernatepolicies API.
          It is namespace-scoped and hibernates all workloads of the configured types
          within its own namespace outside of the configured availability windows.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: HibernatePolicySpec defines the desired state of HibernatePolicy.
            properties:
              action:
                description: Action defines what the controller does when hibernating
                  workloads.
                properties:
                  maxReplicas:
                    description: |-
                      MaxReplicas caps each Deployment, StatefulSet and ReplicaSet to the given
                      replica count during hibernation. Workloads already at or below this value
                      are left unchanged (no-op). Set to 0 to scale them completely to zero.
                      When set, any HPA targeting an affected workload is suspended: its
                      minReplicas and maxReplicas are both clamped to MaxReplicas and the
                      originals are stored in annotations on the HPA for restoration on wake.

                      This field has NO effect on DaemonSets. Use SleepDaemonSet to hibernate
                      DaemonSets.
                    format: int32
                    minimum: 0
                    type: integer
                  sleepDaemonSet:
                    default: false
                    description: |-
                      SleepDaemonSet hibernates DaemonSets by injecting a non-schedulable
                      nodeSelector (greencosts.hstr.nl/hibernate: "true") into every DaemonSet
                      podTemplate, causing all existing pods to be evicted and no new pods to be
                      scheduled. The original nodeSelector is preserved in the annotation
                      greencosts.hstr.nl/original-nodeselector and restored on wake.

                      This field has NO effect on Deployments, StatefulSets or ReplicaSets.
                      Use MaxReplicas (set to 0 or any cap) to hibernate those workload types.
                    type: boolean
                type: object
              availabilityWindows:
                description: |-
                  AvailabilityWindows lists recurring time windows during which hibernation
                  is suppressed. Hibernated workloads are restored at the start of each window.
                items:
                  description: |-
                    AvailabilityWindow defines a recurring time window during which hibernation is
                    suppressed and any hibernated workloads are restored.
                  properties:
                    from:
                      description: From is the wall-clock start time (HH:MM) in Timezone.
                      pattern: ^([01][0-9]|2[0-3]):[0-5][0-9]$
                      type: string
                    timezone:
                      default: UTC
                      description: Timezone is the IANA timezone name for this window
                        (e.g. "Europe/Amsterdam").
                      type: string
                    until:
                      description: Until is the wall-clock end time (HH:MM) in Timezone.
                      pattern: ^([01][0-9]|2[0-3]):[0-5][0-9]$
                      type: string
                    weekdays:
                      description: Weekdays lists the days of the week this window
                        applies to.
                      items:
                        description: Weekday is a three-letter abbreviation for a
                          day of the week.
                        enum:
                        - Mon
                        - Tue
                        - Wed
                        - Thu
                        - Fri
                        - Sat
                        - Sun
                        type: string
                      minItems: 1
                      type: array
                  required:
                  - from
                  - timezone
                  - until
                  - weekdays
                  type: object
                type: array
              workloadTypes:
                description: |-
                  WorkloadTypes lists the workload kinds this policy will hibernate.
                  At least one type must be specified.
                items:
                  description: WorkloadType identifies a supported Kubernetes workload
                    kind.
                  enum:
                  - Deployment
                  - StatefulSet
                  - DaemonSet
                  - ReplicaSet
                  type: string
                minItems: 1
                type: array
            required:
            - action
            - workloadTypes
            type: object
          status:
            description: HibernatePolicyStatus defines the observed state of HibernatePolicy.
            properties:
              conditions:
                description: Conditions reflect the current state of the HibernatePolicy
                  reconciliation.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              hibernatedWorkloads:
                description: |-
                  HibernatedWorkloads lists the workloads (Kind/name) currently scaled to
                  zero by this policy.
                items:
                  type: string
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
