            - message: provider enever requires exactly providers.eneverConfig
              rule: 'self.provider == ''enever'' ? (has(self.providers) && has(self.providers.eneverConfig)
                && !has(self.providers.entsoeConfig) && !has(self.providers.customProviderConfig))
                : true'
            - message: provider customProvider requires exactly providers.customProviderConfig
              rule: 'self.provider == ''customProvider'' ? (has(self.providers) &&
                has(self.providers.customProviderConfig) && !has(self.providers.entsoeConfig)
                && !has(self.providers.eneverConfig)) : true'
            - message: provider energyzero does not use providers config
              rule: 'self.provider == ''energyzero'' ? (!has(self.providers) || (!has(self.providers.entsoeConfig)
                && !has(self.providers.eneverConfig) && !has(self.providers.customProviderConfig)))
                : true'
