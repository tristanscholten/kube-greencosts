                description: |-
                  RefreshSchedule is a standard five-field cron expression that controls
                  when the controller fetches fresh price data.
                  Defaults to "0 0,6,12,18 * * *" (every 6 hours at 00:00, 06:00, 12:00, 18:00 UTC).
                type: string
            required:
